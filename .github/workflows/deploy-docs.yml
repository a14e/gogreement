name: Deploy Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'book/**'
      - 'Makefile'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'book/**'
      - 'Makefile'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Always build the book (on PRs too) so rendering errors are caught before merge.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build book
        run: make docs

      - name: Upload artifact
        # Only the deploy path needs the artifact; PRs just validate the build.
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/gogreement-docs/book

  deploy:
    # Deploy only from master pushes, not from pull requests.
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
